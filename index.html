<script>
function toggle(el){
  el.classList.toggle("active");
}

/* =========================
   LAGOS BACKGROUND (VISIBLE + DARK)
========================= */
const images = [
  "https://images.unsplash.com/photo-1605460375648-278bcbd579a6?auto=format&fit=crop&w=2000&q=80", // Lekki-Ikoyi Bridge
  "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=2000&q=80", // Lagos skyline
  "https://images.unsplash.com/photo-1585061528750-3b8f0c0f5f5c?auto=format&fit=crop&w=2000&q=80", // Victoria Island
  "https://images.unsplash.com/photo-1610701596007-11502861dcfa?auto=format&fit=crop&w=2000&q=80"  // Lagos aerial
];

const city = document.querySelector(".city");
let i = 0;

function setBg(){
  city.style.backgroundImage = `url(${images[i]})`;
  i = (i + 1) % images.length;
}

setBg();
setInterval(setBg, 6000);
</script>
