<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iStylist</title>

<style>
/* =========================
   BRAND COLORS
========================= */
:root {
  --pink: #ff4fd8;
  --cyan: #00e5ff;
  --dark: #05060a;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--dark);
  overflow: hidden;
  height: 100vh;
}

/* =========================
   CITY BACKGROUND (FIXED)
   Uses multiple layers for reliability
========================= */
.city {
  position: fixed;
  inset: 0;
  z-index: 0;

  /* fallback gradient (always shows) */
  background: linear-gradient(to top, #02030a, #05060a 60%, #0b0f1a);

  overflow: hidden;
}

/* skyline image layer */
.city::before {
  content: "";
  position: absolute;
  inset: 0;

  background-image: url("https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=2000&q=80");
  background-size: cover;
  background-position: center bottom;

  opacity: 0.45;
  filter: brightness(0.6) contrast(1.3);

  animation: cityMove 18s ease-in-out infinite;
}

/* neon haze layer */
.city::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 30%, rgba(255,79,216,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,229,255,0.14), transparent 45%);

  mix-blend-mode: screen;
}

/* city motion */
@keyframes cityMove {
  0% { transform: scale(1.05) translateY(0px); }
  50% { transform: scale(1.12) translateY(-12px); }
  100% { transform: scale(1.05) translateY(0px); }
}

/* =========================
   HERO
========================= */
.hero {
  position: relative;
  z-index: 10;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  color: white;
}

.logo {
  font-size: 72px;
  font-weight: bold;
}

.logo-i {
  color: var(--pink);
  text-shadow: 0 0 20px var(--pink), 0 0 40px var(--cyan);
  position: relative;
}

/* sparkle */
.logo-i::after {
  content: "";
  position: absolute;
  top: -10px;
  left: 50%;

  width: 6px;
  height: 6px;
  background: white;

  box-shadow:
    0 0 10px var(--pink),
    0 0 25px var(--cyan);

  animation: sparkle 1.4s infinite;
}

@keyframes sparkle {
  0%,100% { transform: scale(0.8); opacity: 0.4; }
  50% { transform: scale(1.6); opacity: 1; }
}

.tagline {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0.8;
}

/* =========================
   BUTTONS
========================= */
.buttons {
  margin-top: 25px;
  display: flex;
  gap: 12px;
}

.btn {
  padding: 12px 22px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.primary {
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  color: black;
}

.primary:hover {
  transform: scale(1.05);
}

.secondary {
  background: transparent;
  border: 1px solid white;
  color: white;
}

.secondary:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

/* =========================
   PARTICLES
========================= */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  opacity: 0.6;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- CITY BACKGROUND -->
<div class="city"></div>

<!-- HERO -->
<div class="hero">
  <div class="logo">
    <span class="logo-i">i</span>Stylist
  </div>

  <div class="tagline">
    Book Beauty, Fashion & Lifestyle Services Anywhere
  </div>

  <div class="buttons">
    <button class="btn primary">Get Started</button>
    <button class="btn secondary">Explore Stylists</button>
  </div>
</div>

<!-- PARTICLES -->
<script>
const colors = ["#ff4fd8", "#00e5ff", "#ffffff"];

function spawnParticle() {
  const p = document.createElement("div");
  p.classList.add("particle");

  const size = Math.random() * 4 + 2;
  p.style.width = size + "px";
  p.style.height = size + "px";

  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.animationDuration = (3 + Math.random() * 5) + "s";

  p.style.background = colors[Math.floor(Math.random() * colors.length)];

  document.body.appendChild(p);

  setTimeout(() => p.remove(), 8000);
}

setInterval(spawnParticle, 120);
</script>

</body>
</html>
